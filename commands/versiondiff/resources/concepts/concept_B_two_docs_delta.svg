<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Concept B: Two Documents with Delta Symbol
       Two offset document sheets with a delta/change indicator -->
  <g fill="none" stroke="#4A4A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Back document -->
    <rect x="22" y="6" width="28" height="36" rx="1.5"/>
    <!-- Back doc fold -->
    <path d="M42,6 L42,14 L50,14"/>
    <!-- Back doc lines -->
    <line x1="27" y1="18" x2="40" y2="18" stroke-width="1.5"/>
    <line x1="27" y1="23" x2="40" y2="23" stroke-width="1.5"/>
    <line x1="27" y1="28" x2="35" y2="28" stroke-width="1.5"/>
    <!-- Front document -->
    <rect x="14" y="22" width="28" height="36" rx="1.5" fill="white"/>
    <rect x="14" y="22" width="28" height="36" rx="1.5"/>
    <!-- Front doc fold -->
    <path d="M34,22 L34,30 L42,30"/>
    <!-- Front doc lines with diff highlights -->
    <line x1="19" y1="34" x2="32" y2="34" stroke-width="1.5"/>
    <line x1="19" y1="39" x2="32" y2="39" stroke-width="1.5" stroke="#0080FF"/>
    <line x1="19" y1="44" x2="27" y2="44" stroke-width="1.5" stroke="#0080FF"/>
    <line x1="19" y1="49" x2="30" y2="49" stroke-width="1.5"/>
    <!-- Delta badge -->
    <circle cx="50" cy="50" r="9" fill="#0080FF" stroke="none"/>
    <text x="50" y="54.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white" stroke="none">Δ</text>
  </g>
</svg>