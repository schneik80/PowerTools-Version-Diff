<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Concept E: Two Overlapping Clocks / Version Snapshots
       Two offset clock faces representing two points in time being compared -->
  <g fill="none" stroke="#4A4A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Back clock circle -->
    <circle cx="38" cy="24" r="16" opacity="0.35"/>
    <!-- Back clock hands -->
    <line x1="38" y1="24" x2="38" y2="14" stroke-width="2" opacity="0.35"/>
    <line x1="38" y1="24" x2="46" y2="27" stroke-width="2" opacity="0.35"/>
    <!-- Front clock circle -->
    <circle cx="26" cy="36" r="16" fill="white"/>
    <circle cx="26" cy="36" r="16"/>
    <!-- Front clock hands (different time) -->
    <line x1="26" y1="36" x2="26" y2="26" stroke-width="2.5"/>
    <line x1="26" y1="36" x2="18" y2="32" stroke-width="2.5"/>
    <!-- Center dot -->
    <circle cx="26" cy="36" r="1.5" fill="#4A4A4A"/>
    <!-- Diff badge -->
    <circle cx="50" cy="50" r="9" fill="#0080FF" stroke="none"/>
    <!-- Not-equal symbol in badge -->
    <line x1="45" y1="47" x2="55" y2="47" stroke="white" stroke-width="2"/>
    <line x1="45" y1="53" x2="55" y2="53" stroke="white" stroke-width="2"/>
    <line x1="53" y1="44" x2="47" y2="56" stroke="white" stroke-width="2"/>
  </g>
</svg>