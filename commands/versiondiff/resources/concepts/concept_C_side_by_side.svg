<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Concept C: Side-by-Side Comparison
       Two panels split by a divider, with diff indicators -->
  <g fill="none" stroke="#4A4A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left panel -->
    <rect x="6" y="8" width="23" height="48" rx="2"/>
    <!-- Right panel -->
    <rect x="35" y="8" width="23" height="48" rx="2"/>
    <!-- Left panel content lines -->
    <line x1="10" y1="16" x2="22" y2="16" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="22" x2="20" y2="22" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="28" x2="24" y2="28" stroke-width="2" stroke="#E05020"/>
    <line x1="10" y1="34" x2="18" y2="34" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="40" x2="22" y2="40" stroke-width="2" stroke="#E05020"/>
    <line x1="10" y1="46" x2="20" y2="46" stroke-width="1.5" opacity="0.5"/>
    <!-- Right panel content lines -->
    <line x1="39" y1="16" x2="51" y2="16" stroke-width="1.5" opacity="0.5"/>
    <line x1="39" y1="22" x2="49" y2="22" stroke-width="1.5" opacity="0.5"/>
    <line x1="39" y1="28" x2="53" y2="28" stroke-width="2" stroke="#0080FF"/>
    <line x1="39" y1="34" x2="47" y2="34" stroke-width="1.5" opacity="0.5"/>
    <line x1="39" y1="40" x2="51" y2="40" stroke-width="2" stroke="#0080FF"/>
    <line x1="39" y1="46" x2="49" y2="46" stroke-width="1.5" opacity="0.5"/>
    <!-- Center comparison arrows -->
    <polyline points="27,30 31,32 27,34" stroke-width="1.5"/>
    <polyline points="37,30 33,32 37,34" stroke-width="1.5"/>
  </g>
</svg>